networks:
  medusaEvolution_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  evolution_instances:

services:
  # ──────────────────────────────────────────────
  #  POSTGRES
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: medusaEvolution_postgres
    restart: unless-stopped
    command: postgres -c max_connections=300
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusaEvolution_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────
  #  REDIS
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: medusaEvolution_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 3gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - medusaEvolution_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────
  #  RABBITMQ
  # ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: medusaEvolution_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - medusaEvolution_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ──────────────────────────────────────────────
  #  EVOLUTION API v2
  # ──────────────────────────────────────────────
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: medusaEvolution_api
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # ── Servidor ──────────────────────────────
      SERVER_URL: http://localhost:8081

      # ── Autenticação ──────────────────────────
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}

      # ── Banco de dados ────────────────────────
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

      # Gravação massiva DESLIGADA — evita I/O flooding (lição do v1)
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_DATA_OLD_MESSAGE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
      DATABASE_SAVE_DATA_LABELS: "false"
      DATABASE_SAVE_DATA_HISTORY: "false"

      # ── Cache Redis ───────────────────────────
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379

      # ── Webhook ───────────────────────────────
      WEBHOOK_GLOBAL_ENABLED: "false"

      # ── Logs ──────────────────────────────────
      LOG_LEVEL: ERROR,WARN,INFO
      LOG_BAILEYS: error
      WA_BAILEYS_SAVE_BATS_INFO: "true"

    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - medusaEvolution_net
